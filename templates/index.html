<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper2Agent</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --text: #e1e4ed;
      --muted: #8b8fa3;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --success: #22c55e;
      --code-bg: #12131f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: .25rem;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      font-size: .95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    input, textarea {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--code-bg);
      color: var(--text);
      font-size: .9rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block;
      padding: .65rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: #fff;
    }

    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }

    #output {
      display: none;
    }

    #output.visible { display: block; }

    .step {
      padding: .75rem 1rem;
      background: var(--code-bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      margin-bottom: .75rem;
    }

    .step .tool-name {
      font-weight: 600;
      color: var(--accent);
      font-size: .85rem;
    }

    .step .summary {
      color: var(--muted);
      font-size: .85rem;
      margin-top: .2rem;
    }

    .status-badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .status-badge.complete { background: #16301d; color: var(--success); }
    .status-badge.progress { background: #2a2000; color: #facc15; }
    .status-badge.error    { background: #301616; color: #ef4444; }

    .final-summary {
      white-space: pre-wrap;
      font-size: .9rem;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: .8rem;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Paper<span>2</span>Agent</h1>
      <p>Convert research papers into executable workflow guidance</p>
    </header>

    <div class="card">
      <h2>Convert a Paper</h2>
      <label for="source">Paper source (arXiv ID, GitHub URL, or paste text)</label>
      <input id="source" placeholder="e.g. 2301.12345 or https://github.com/org/repo" />

      <label for="query">Focus query (optional)</label>
      <textarea id="query" rows="2" placeholder="e.g. Extract the training pipeline and data preprocessing steps"></textarea>

      <button class="btn" id="convertBtn" onclick="convert()">Convert to Workflow</button>
    </div>

    <div class="card" id="output">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
        <h2 style="margin:0">Results</h2>
        <span class="status-badge" id="statusBadge"></span>
      </div>

      <div id="steps"></div>

      <div id="summaryWrap" style="display:none; margin-top:1rem">
        <label>Summary</label>
        <div class="final-summary" id="summaryText"></div>
      </div>
    </div>

    <div class="card">
      <h2>Search Knowledge Base</h2>
      <div class="row">
        <div>
          <label for="searchQ">Query</label>
          <input id="searchQ" placeholder="semantic search..." />
        </div>
        <div style="flex:0 0 auto; display:flex; align-items:flex-end; padding-bottom:1rem">
          <button class="btn btn-outline" onclick="search()">Search</button>
        </div>
      </div>
      <div id="searchResults"></div>
    </div>

    <footer>Paper2Agent &mdash; built by Chris Biju</footer>
  </div>

  <script>
    async function convert() {
      const source = document.getElementById('source').value.trim();
      const query  = document.getElementById('query').value.trim();
      if (!source) return alert('Enter a paper source.');

      const btn = document.getElementById('convertBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Processing...';

      const output = document.getElementById('output');
      output.classList.add('visible');

      const badge = document.getElementById('statusBadge');
      badge.className = 'status-badge progress';
      badge.textContent = 'Running';

      document.getElementById('steps').innerHTML = '';
      document.getElementById('summaryWrap').style.display = 'none';

      try {
        const res = await fetch('/api/convert', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source, query}),
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        const stepsEl = document.getElementById('steps');
        (data.steps || []).forEach(s => {
          stepsEl.innerHTML += `
            <div class="step">
              <div class="tool-name">Step ${s.step}: ${s.tool}</div>
              <div class="summary">${s.result_summary}</div>
            </div>`;
        });

        if (data.final_summary) {
          document.getElementById('summaryWrap').style.display = 'block';
          document.getElementById('summaryText').textContent = data.final_summary;
        }

        badge.className = 'status-badge ' + (data.status === 'complete' ? 'complete' : 'error');
        badge.textContent = data.status;
      } catch (err) {
        badge.className = 'status-badge error';
        badge.textContent = 'Error';
        document.getElementById('steps').innerHTML =
          `<div class="step" style="border-color:#ef4444">${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Convert to Workflow';
      }
    }

    async function search() {
      const q = document.getElementById('searchQ').value.trim();
      if (!q) return;

      const el = document.getElementById('searchResults');
      el.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({query: q, top_k: 5}),
        });
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">No results found.</p>';
          return;
        }

        el.innerHTML = data.results.map(r => `
          <div class="step">
            <div class="tool-name">${r.metadata?.section || 'chunk'} (score: ${r.score?.toFixed(3)})</div>
            <div class="summary">${r.text?.substring(0, 300)}...</div>
          </div>`).join('');
      } catch (err) {
        el.innerHTML = `<p style="color:#ef4444;font-size:.85rem">${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
